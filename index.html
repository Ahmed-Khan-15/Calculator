<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">

        <h1 class="calculator">
            Calculator
        </h1>

        <div class="main">
            <div class="input_container">
                <input type="text" id="user_input" class="first-input">
            </div>

            <div class="all-buttons-container">
                <button id="function_AC" class="function_buttons btns" onclick="clear_operation()">AC</button>
                <button id="function_back" class="function_buttons btns" onclick="backspace()">←</button>
                <button id="function_DIVISION" class="function_buttons btns maths-buttons"
                    onclick="math_operation(this)">÷</button>
                <button id="number_1" class="number_buttons btns" onclick="get_number(this)">1</button>
                <button id="number_2" class="number_buttons btns" onclick="get_number(this)">2</button>
                <button id="number_3" class="number_buttons btns" onclick="get_number(this)">3</button>
                <button id="function_MULTIPLICATION" class="function_buttons btns maths-buttons"
                    onclick="math_operation(this)">×</button>
                <button id="number_4" class="number_buttons btns" onclick="get_number(this)">4</button>
                <button id="number_5" class="number_buttons btns" onclick="get_number(this)">5</button>
                <button id="number_6" class="number_buttons btns" onclick="get_number(this)">6</button>
                <button id="function_MINUS" class="function_buttons btns maths-buttons"
                    onclick="math_operation(this)">-</button>
                <button id="number_7" class="number_buttons btns" onclick="get_number(this)">7</button>
                <button id="number_8" class="number_buttons btns" onclick="get_number(this)">8</button>
                <button id="number_9" class="number_buttons btns" onclick="get_number(this)">9</button>
                <button id="function_PLUS" class="function_buttons btns maths-buttons"
                    onclick="math_operation(this)">+</button>
                <button id="number_0" class="number_buttons btns" onclick="get_number(this)">0</button>
                <button id="number_point" class="number_buttons btns" onclick="number_point(this)">.</button>
                <button id="function_=" class="function_buttons btns maths-buttons" onclick="perform()">=</button>

            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>

</html>
