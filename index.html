<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=delete" />
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">

        <h1 class="calculator">
            Calculator
        </h1>

        <div class="main">
            <div class="input_container">
                <input type="text" id="user_input" class="first-input">
            </div>

            <div class="all-buttons-container">
                <div class="history_container display_none">
                    <button class="go_back Transparent">⇦ Back</button>
                    <div class="all_history_container">

                        <div class="history">
                            <span class="material-symbols-outlined Transparent delete_this_history">
                                delete
                            </span>
                            <p class="equation_para">5 * 5 =</p>
                            <p class="result_para">55</p>
                        </div>
                        <div class="history">
                            <span class="material-symbols-outlined Transparent delete_this_history">
                                delete
                            </span>
                            <p class="equation_para">5 * 5 =</p>
                            <p class="result_para">55</p>
                        </div>
                        <div class="history">
                            <span class="material-symbols-outlined Transparent delete_this_history">
                                delete
                            </span>
                            <p class="equation_para">5 * 5 =</p>
                            <p class="result_para">55</p>
                        </div>
                        

                    </div>
                    <button class="clear_all Transparent">clear history</button>
                </div>
                <button id="function_History" class="function_buttons btns function-H">H</button>
                <button id="function_AC" class="function_buttons btns function-AC">AC</button>
                <button id="function_back" class="function_buttons btns function-back">←</button>
                <button id="function_DIVISION" class="function_buttons btns maths-buttons pink-buttons">÷</button>
                <button id="number_1" class="number_buttons btns">1</button>
                <button id="number_2" class="number_buttons btns">2</button>
                <button id="number_3" class="number_buttons btns">3</button>
                <button id="function_MULTIPLICATION" class="function_buttons btns maths-buttons pink-buttons">×</button>
                <button id="number_4" class="number_buttons btns">4</button>
                <button id="number_5" class="number_buttons btns">5</button>
                <button id="number_6" class="number_buttons btns">6</button>
                <button id="function_MINUS" class="function_buttons btns maths-buttons pink-buttons">-</button>
                <button id="number_7" class="number_buttons btns">7</button>
                <button id="number_8" class="number_buttons btns">8</button>
                <button id="number_9" class="number_buttons btns">9</button>
                <button id="function_PLUS" class="function_buttons btns maths-buttons pink-buttons">+</button>
                <button id="number_0" class="number_buttons btns">0</button>
                <button id="number_00" class="number_buttons btns">00</button>
                <button id="number_point" class="point_button btns">.</button>
                <button id="function_=" class="function_buttons btns pink-buttons function-equal">=</button>


            </div>
        </div>

    </div>
    <script type="module" src="app.js"></script>
</body>

</html>
